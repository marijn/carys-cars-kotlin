spring:
  datasource:
    url: jdbc:h2:mem:carshare;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  flyway:
    enabled: false
  # Disable the oauth2 resource server auto-config entirely for local
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration

stripe:
  api-key: sk_local
  webhook-secret: whsec_local

smartcar:
  client-id: local
  client-secret: local
  base-url: http://localhost:9999

veriff:
  api-key: local
  base-url: http://localhost:9998

app:
  reservation:
    free-minutes-per-day: 20
    expiry-minutes: 20
    overage-rate-cents: 20
  rental:
    rate-cents-per-minute: 39
    max-km-free: 200
    overage-rate-cents-per-km: 30
  battery:
    charge-threshold-percent: 15
  operating-region:
    cities:
      - name: Amsterdam
        country: NL
      - name: Berlin
        country: DE
      - name: Zurich
        country: CH
      - name: Munich
        country: DE
      - name: Copenhagen
        country: DK
      - name: Rotterdam
        country: NL
      - name: Dusseldorf
        country: DE
